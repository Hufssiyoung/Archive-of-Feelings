      [2026-01-18 / 분노] 야근을 강요하면서 고맙다는 말 한마디도 없다.
      [2026-01-17 / 설렘] 오랜 친구에게서 연락이 왔다. 오랜만에 웃었다.
      [2026-01-16 / 불쾌함] 후배가 내 아이디어를 자기 것인 양 발표했다.
      [2026-01-15 / 분노] 팀장이 내 보고서를 팀원들 앞에서 공개적으로 망신 줬다.
      [2026-01-14 / 분노] 회식 자리에서 또 억지로 술을 권유받았다. 싫다고 했는데도.
