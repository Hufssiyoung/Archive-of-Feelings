      [2026-02-14 / 설렘] 오랜만에 아내와 외식을 했다. 잠깐이지만 마음이 가벼웠다.
      [2026-02-13 / 두려움] 구조조정 대상 명단이 오간다는 소문에 종일 가슴이 두근거렸다.
      [2026-02-12 / 불쾌함] 점심 자리에서 내 의견이 묵살됐다. 기분이 영 좋지 않다.
      [2026-02-11 / 두려움] 인사 발령 공문이 돌았다는 말에 손이 떨렸다.
      [2026-02-10 / 두려움] 팀 구조조정 소문이 돌면서 내 자리가 없어질까 봐 밤새 잠을 못 잤다.
      [2026-02-09 / 평온] 일찍 퇴근해서 산책을 했다. 잠시나마 머리가 맑아지는 느낌이었다.
      [2026-02-08 / 슬픔] 퇴근길에 괜히 눈물이 나왔다. 이유를 모르겠다.
    answer: |
      **공감**
      최근 일주일 동안 인사 발령 소문과 구조조정 공포 때문에 많이 힘드셨겠어요. 공문 하나에도 손이 떨리고, 밤새 잠을 못 이룰 만큼 '내 자리가 사라질 수도 있다'는 두려움이 며칠째 이어지고 있군요. 그래도 2월 14일에 아내와 오랜만에 외식을 하며 마음이 잠깐 가벼워진 순간이 있었어요. 그래도 여전히 그 다음 날이면 다시 그 무게가 돌아오고, 아무것도 통제할 수 없다는 무력감이 남아 있을 것 같아요. 당분간은 아내와의 그 저녁 식사처럼 잠깐이라도 숨을 고를 수 있었던 순간을 떠올리며, 아래 조언들을 함께 해보아요.

      **조언**
      1. **통제 가능한 영역 목록 작성 (ACT)**: '지금 내가 바꿀 수 있는 것'과 '바꿀 수 없는 것'을 종이에 나눠 적어보세요. 소문이나 인사 결정은 통제 불가 영역이지만, 업무 성과 기록이나 역량 강화는 통제 가능합니다. 바꿀 수 없는 것에 쏟던 에너지를 의도적으로 이쪽으로 돌리는 것이 핵심입니다.
      2. **점진적 노출로 불안 둔감화**: '구조조정' 관련 정보를 하루 10분만 의도적으로 찾아보고 나머지 시간은 차단하는 규칙을 세워보세요. 노출 시간을 스스로 통제하는 훈련이 반복되면 공포 반응이 점차 줄어듭니다.
      3. **수면 전 4-7-8 호흡 루틴**: 취침 10분 전, 4초 들이쉬기 → 7초 참기 → 8초 내쉬기를 3회 반복하세요. 과각성된 교감신경을 가라앉혀 수면 진입을 돕는 근거 기반 기법입니다.

