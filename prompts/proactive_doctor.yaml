      **공감**
      최근 일주일 동안 소음, 도시락 참견, 예약 취소 통보, 무시당한 인사까지 작은 불쾌함들이 매일 쌓이면서 많이 지치셨겠어요. 그래도 3월 6일에 혼자 좋아하는 식당에 가서 오랜만에 여유로운 한 끼를 즐기셨던 순간이 있었어요. 그래도 여전히 사무실 자체가 숨막히는 공간처럼 느껴지는 불쾌함이 남아 있을 것 같아요. 당분간은 그 여유로운 점심 한 끼처럼 나만을 위한 작은 시간을 떠올리며, 아래 조언들을 함께 해보아요.

      **조언**
      1. **물리적 환경 설계 (자극 통제)**: 집중 업무 시간은 회의실이나 공용 집중실을 미리 예약해 두세요. 재택근무 날처럼 환경 자체를 바꾸는 것이 의지력을 쓰는 것보다 훨씬 효율적입니다. 가능하다면 주 1~2회 재택을 정례화하는 것도 좋습니다.
      2. **경계 설정 연습 (Assertiveness Training)**: 참견이나 부당한 요청에 '지금은 집중 중이라 나중에 얘기해요'라는 문장을 미리 준비해 두세요. 즉각 반응하지 않아도 되는 여유가 생기고, 반복 사용할수록 경계가 자연스럽게 자리잡힙니다.
      3. **하루 마감 '불쾌함 기록 3줄' (마음챙김)**: 퇴근 전 오늘 불쾌했던 상황을 한 줄씩 적고 파일을 닫으세요. 감정을 퇴근 후 시간까지 끌고 가지 않도록 의식적으로 마감하는 루틴입니다.
