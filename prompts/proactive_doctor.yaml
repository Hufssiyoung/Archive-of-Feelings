      3. **신체 이완 — 10분 산책 루틴**: 점심 공원 벤치처럼 이미 몸이 반응하고 있습니다. 퇴근 후 집 근처를 10분만 걷는 루틴을 만들어보세요. 가벼운 유산소 운동은 세로토닌을 높여 슬픔의 신체적 무게를 줄이는 데 도움이 됩니다.

