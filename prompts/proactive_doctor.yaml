    answer: |
      **공감**
      최근 일주일 동안 팀장의 공개 망신, 야근 강요, 아이디어 도용까지 겹치며 분노가 며칠째 가라앉지 않고 있군요. 20년 경력을 쌓아온 분이 느끼셨을 모멸감이 얼마나 깊었을지 충분히 이해됩니다. 그래도 1월 17일에 오랜 친구에게서 연락이 와 오랜만에 웃을 수 있었던 순간이 있었어요. 그래도 여전히 집에 와서도 기댈 곳 없이 혼자 삭여야 하는 분노와 외로움이 남아 있을 것 같아요. 당분간은 그 친구의 연락처럼 나를 잠깐이라도 웃게 해준 사람과의 연결을 떠올리며, 아래 조언들을 함께 해보아요.

      **조언**
      1. **ABC 감정 일지 작성 (CBT)**: 분노가 치밀었던 순간을 A(상황) - B(그때 든 생각) - C(감정·행동)로 기록해 보세요. '팀장이 망신 줬다'는 사실(A)과 '나는 무능하다'는 해석(B)을 분리하면 감정의 원인을 정확히 파악하고 왜곡된 생각을 교정할 수 있습니다.
      2. **신체 활동으로 각성 해소**: 분노는 코르티솔·아드레날린이 급증한 신체 상태입니다. 퇴근 후 20분 빠른 걷기나 계단 오르내리기로 이 각성을 물리적으로 소진시켜 주세요. 다음 날 회의 전 5분 스트레칭도 효과적입니다.
      3. **단호한 자기표현 한 문장 준비 (Assertiveness Training)**: '저는 개별 피드백을 선호합니다'처럼 '나' 주어로 감정이 아닌 요구를 표현하는 문장을 미리 써두세요. 즉각 사용하지 않아도 준비 자체가 자존감을 회복시킵니다.

