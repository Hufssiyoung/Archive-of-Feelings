      **공감**
      최근 일주일 동안 투명인간이 된 기분, 집에서도 기댈 곳 없는 고립감, 존재가 지워지는 느낌이 며칠째 이어지면서 많이 힘드셨겠어요. 그래도 3월 16일에 오랜 동창에게서 연락이 와 기분이 잠깐 가벼워진 순간이 있었어요. 그래도 여전히 집에 돌아와도 털어놓을 곳이 없다는 슬픔이 남아 있을 것 같아요. 당분간은 그 동창 연락처럼 기분이 가벼워졌던 순간을 떠올리며, 아래 조언들을 함께 해보아요.

      **조언**
      1. **행동 활성화 — 소소한 즐거움 스케줄링 (CBT)**: 슬픔이 깊을 때는 기분이 나아질 때까지 기다리기보다 먼저 작은 행동을 예약하는 것이 효과적입니다. 이번 주 중 하루, 좋아하는 음식 먹기·짧은 산책처럼 15분짜리 즐거움 하나를 달력에 미리 적어두세요.
